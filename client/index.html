<!DOCTYPE html>
<html>
<head>
  <title>Table Example</title>
  <style>
    table {
      width: 60%;
      border-collapse: collapse;
      margin: 20px auto;
      font-family: Arial, sans-serif;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
  const root = document.getElementById("root");

  root.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Age</th>
          <th>City</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>John Doe</td>
          <td>28</td>
          <td>New York</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Jane Smith</td>
          <td>34</td>
          <td>London</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Mike Johnson</td>
          <td>25</td>
          <td>Toronto</td>
        </tr>
      </tbody>
    </table>
  `;
</script>

</body>
</html>
